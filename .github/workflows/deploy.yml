name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'app-react/**'
      - 'app-admin/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app-react/package-lock.json

      - name: Build app-react
        working-directory: app-react
        run: |
          npm ci
          npm run lint
          npm test
          npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}

      - name: Build app-admin
        working-directory: app-admin
        run: |
          npm ci
          npm run lint
          npm test
          npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # app-react vira a raiz do site (/EAFIT/) e app-admin fica em /EAFIT/admin/ —
      # os dois "base" dos vite.config.js já apontam pra esses caminhos.
      - name: Combine sites
        run: |
          mkdir -p combined
          cp -r app-react/dist/. combined/
          mkdir -p combined/admin
          cp -r app-admin/dist/. combined/admin/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: combined

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
